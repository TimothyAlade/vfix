<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoxFix AI - Authentication</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div class="auth-container">

  <div class="auth-card">
    <h2>Welcome to VoxFix AI</h2>
    <p>Sign in or create an account to unlock premium features</p>

    <!-- First name for greeting -->
    <input type="text" id="firstName" placeholder="First Name (for greeting)" />

    <!-- Email and Password -->
    <input type="email" id="email" placeholder="Email Address" />
    <input type="password" id="password" placeholder="Password" />

    <!-- Verification Code -->
    <input type="text" id="verificationCode" placeholder="Enter verification code" />

    <button class="auth-btn" onclick="signUp()">Sign Up</button>
    <button class="auth-btn" onclick="login()">Login</button>

    <div class="divider">OR</div>

    <button class="auth-btn google" onclick="googleSignIn()">Continue with Google</button>
    <button class="auth-btn anonymous" onclick="anonymousSignIn()">Continue as Guest</button>

    <p class="auth-note">
      By signing up, you agree to the <a href="#">Privacy Policy</a>
    </p>

  </div>

</div>

<script type="module" src="auth.js"></script>
</body>
</html>
